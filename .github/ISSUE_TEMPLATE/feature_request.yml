name: Feature request
description: Suggest a new capability or improvement.
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Please describe the problem first, not just
        the solution — that way we can consider alternatives.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that's hard or impossible today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like it to work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Anything you tried, or other approaches you ruled out.
  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - Inspector / hierarchy
        - Editor / YAML
        - Device streaming
        - Runner / execution
        - Settings / packaging
        - Other
    validations:
      required: true
