name: Release

# Triggered by pushing a `v*` tag (e.g. `v0.3.0`). Builds signed bundles
# for macOS (universal) + Windows, publishes them as a draft GitHub
# release, and uploads the `latest.json` manifest the in-app updater
# fetches.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS disabled: GitHub Actions billing blocked. Re-enable once
          # billing is sorted (and also re-enable the `manifest` job below).
          # - platform: macos-latest
          #   args: --target universal-apple-darwin
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Ensure tag is reachable from main
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main --depth=0 2>/dev/null || git fetch origin main
          if ! git merge-base --is-ancestor "${{ github.sha }}" origin/main; then
            echo "::error::Tag ${{ github.ref_name }} is not on main."
            echo "Release tags must point to a commit reachable from main."
            echo "Merge your release branch into main before tagging."
            exit 1
          fi
          echo "OK: ${{ github.sha }} is on main."

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          # macOS universal build needs both targets.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Verify BUSL Change Date
        run: node scripts/check-busl-change-date.mjs

      - run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build, sign, and publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Tauri updater signing — required for the in-app auto-update to
          # accept the new bundle. Generate locally with:
          #   pnpm tauri signer generate -w ~/.tauri/maestro-deck.key
          # then commit the matching public key into tauri.conf.json.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS code signing + notarization (Developer ID Application).
          # Empty on Windows runs — tauri-action just ignores them.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Maestro Deck ${{ github.ref_name }}"
          # Body is taken from CHANGELOG_EN.md by the manifest script
          # below; tauri-action also pulls it as the release body.
          releaseBody: "See CHANGELOG_EN.md for details."
          releaseDraft: true
          prerelease: false
          # We disable the action's updater JSON because it silently
          # skips when the universal-mac sig rename trips its lookup
          # (see post-step below + manifest job).
          includeUpdaterJson: false
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}

      # tauri-action renames the macOS bundle to add `_universal` but
      # does NOT rename the matching `.sig` — so the file never makes
      # it to the release. Upload it ourselves under the matching name.
      - name: Upload macOS updater signature
        if: runner.os == 'macOS'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          SRC="src-tauri/target/universal-apple-darwin/release/bundle/macos/Maestro Deck.app.tar.gz.sig"
          DST="Maestro Deck_universal.app.tar.gz.sig"
          test -f "$SRC" || { echo "::error::missing $SRC"; exit 1; }
          cp "$SRC" "$DST"
          gh release upload "${{ github.ref_name }}" "$DST" \
            --repo "${{ github.repository }}" --clobber

      - name: Upload Windows updater signature
        if: runner.os == 'Windows'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          SRC=$(find src-tauri/target/release/bundle/nsis -maxdepth 1 -type f -name "*.exe.sig" | head -1)
          if [ -z "$SRC" ]; then
            echo "::error::missing nsis .sig — check that createUpdaterArtifacts is set and TAURI_SIGNING_PRIVATE_KEY is provided"
            ls -la src-tauri/target/release/bundle/nsis/ || true
            exit 1
          fi
          gh release upload "${{ github.ref_name }}" "$SRC" \
            --repo "${{ github.repository }}" --clobber

  # Manifest job disabled while macOS is off — it needs both sigs to
  # produce latest.json. Re-enable together with the macOS matrix entry.
  # manifest:
