name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Cancel previous runs of this workflow when new commits land on a branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Speed up cargo by skipping incremental compilation in CI
  CARGO_INCREMENTAL: 0

jobs:
  ci:
    name: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            os: macos
          - platform: ubuntu-22.04
            os: linux
          - platform: windows-latest
            os: windows
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          shared-key: ${{ matrix.os }}

      # Tauri requires several system libraries on Linux. Pinned to the deps
      # available on ubuntu-22.04 and required by webkit2gtk-4.1 / soup-3.
      - name: Install Linux system dependencies (Tauri)
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install frontend dependencies
        shell: bash
        # Tolerate absence of pnpm-lock.yaml (early bootstrap). Prefer frozen
        # lockfile when one exists to keep CI reproducible.
        run: |
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile
          else
            pnpm install --no-frozen-lockfile
          fi

      - name: Frontend - typecheck
        run: pnpm typecheck

      - name: Frontend - lint
        run: pnpm lint

      - name: Frontend - format check
        run: pnpm format:check

      - name: Backend - cargo fmt
        working-directory: src-tauri
        run: cargo fmt --all -- --check

      - name: Backend - cargo clippy
        working-directory: src-tauri
        run: cargo clippy --no-default-features -- -D warnings

      - name: Backend - cargo test
        working-directory: src-tauri
        run: cargo test --no-default-features --lib
