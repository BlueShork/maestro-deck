name: Maestro Deck - Tauri Build
on:
  pull_request:
    paths:
      - "src-tauri/**"
      - "package.json"
      - "pnpm-lock.yaml"
  push:
    tags: ["v*"]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - name: Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: src-tauri }

      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v7
        with: { node-version: 20, cache: pnpm }

      - run: pnpm install --frozen-lockfile --ignore-scripts

      # On PR: just verify it compiles (skip bundling + code-sign).
      # On tag push: full bundle for release artifacts.
      - name: Build (PR — no bundle)
        if: github.event_name == 'pull_request'
        run: pnpm exec tauri build --no-bundle

      - name: Build (tag — full bundle)
        if: startsWith(github.ref, 'refs/tags/v')
        run: pnpm tauri:build
