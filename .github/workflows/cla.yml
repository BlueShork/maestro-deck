name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla-assistant:
    if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        with:
          path-to-signatures: 'signatures/version1/cla.json'
          path-to-document: 'https://github.com/BlueShork/maestro-deck/blob/main/CLA.md'
          branch: 'cla-signatures'
          allowlist: 'dependabot[bot],BlueShork'
          remote-organization-name: ''
          remote-repository-name: ''
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-allsigned-prcomment: 'All contributors have signed the CLA. Thank you!'
          custom-notsigned-prcomment: |
            Thanks for your contribution to **Maestro Deck** 🎉

            Before we can merge, you must sign the [CLA](https://github.com/BlueShork/maestro-deck/blob/main/CLA.md).

            **To sign**, post a comment on this PR with **exactly** this text (copy-paste):

            > I have read the CLA Document and I hereby sign the CLA

            Once signed, your signature is recorded permanently and applies to all your future contributions to this repo.

            ---
            _Posted automatically by [CLA Assistant Lite](https://github.com/contributor-assistant/github-action)._
          lock-pullrequest-aftermerge: true
